# daemonless metadata and cit config
icon: ':material-television:'

cit:
  mode: screenshot
  port: 8989
  health: /ping
  annotations:
    - org.freebsd.jail.allow.mlock=true

build:
  variants:
    - tag: latest
      containerfile: Containerfile
      default: true
    - tag: nightly
      containerfile: Containerfile
      args:
        SONARR_BRANCH: develop
        SONARR_RELEASE_KEY: v4-nightly
      tag_desc: "**Nightly branch** — bleeding-edge pre-release build (Sonarr's `develop` branch). One-way DB migrations; back up /config before switching back to release."
    - tag: pkg
      containerfile: Containerfile.pkg
    - tag: pkg-latest
      containerfile: Containerfile.pkg
      args:
        BASE_VERSION: "15-latest"
